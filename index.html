<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CrowdPick</title>
<script src="https://unpkg.com/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
<script src="https://unpkg.com/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #ff3c5f;
    --accent2: #ffcc00;
    --text: #e8e8f0;
    --muted: #555570;
    --win: #00ffaa;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
  }

  /* ── HEADER ── */
  header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 0.08em;
  }

  header h1 span { color: var(--accent); }

  header p {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── STEPS ── */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .step {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .step-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    line-height: 1;
    min-width: 1.5rem;
  }

  .step-title {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
  }

  .step-status {
    margin-left: auto;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .step-status.done  { color: var(--win); }
  .step-status.active { color: var(--accent2); }

  /* ── UPLOAD ZONE ── */
  #dropZone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  #dropZone:active { background: rgba(255,60,95,0.04); border-color: var(--accent); }
  #dropZone.has-file { border-color: var(--win); border-style: solid; }

  #dropZone svg { opacity: 0.35; }

  #dropZone .dz-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #dropZone .dz-filename {
    font-size: 0.7rem;
    color: var(--win);
    letter-spacing: 0.06em;
    display: none;
  }

  #fileInput { display: none; }

  /* ── VIDEO PREVIEW (hidden, used for frame extraction) ── */
  #hiddenVideo {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    height: 54px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.12s, transform 0.1s;
    -webkit-appearance: none;
    outline: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .btn:active  { transform: scale(0.97); opacity: 0.8; }
  .btn:disabled { opacity: 0.25; pointer-events: none; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-win     { background: var(--win);    color: #000; font-size: 0.85rem; }
  .btn-ghost   {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 0.7rem;
  }

  /* ── RESULT CANVAS ── */
  #resultWrap {
    display: none;
    flex-direction: column;
    gap: 0.75rem;
  }

  #resultCanvas {
    width: 100%;
    border-radius: 6px;
    display: block;
    border: 1px solid var(--border);
  }

  /* Winner badge */
  #winnerBadge {
    display: none;
    background: var(--surface);
    border: 1px solid var(--win);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    align-items: center;
    gap: 1rem;
  }

  #winnerBadge .wb-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--win);
    line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,170,0.3);
  }

  #winnerBadge .wb-right {}
  #winnerBadge .wb-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  #winnerBadge .wb-sub {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── PROGRESS / STATUS ── */
  #progressWrap {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }

  #progressBar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #progressFill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  #progressLabel {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CONFIDENCE SLIDER ── */
  .conf-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .conf-row label {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .conf-val {
    font-size: 0.72rem;
    color: var(--text);
    min-width: 32px;
    text-align: right;
  }

  /* ── PEOPLE COUNT ── */
  #peopleCount {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: none;
  }

  #peopleCount span { color: var(--accent2); }

  /* ── LOADING OVERLAY ── */
  #loadingOverlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    transition: opacity 0.4s;
  }

  #loadingOverlay.hide { opacity: 0; pointer-events: none; }

  #loadingOverlay h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
  }

  #loadingOverlay h1 span { color: var(--accent); }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loadMsg {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 2rem;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 300;
    border-radius: 2px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(105vh) rotate(600deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <h1>CROWD<span>PICK</span></h1>
  <div class="spinner"></div>
  <span id="loadMsg">Loading AI model...</span>
</div>

<!-- Hidden video element for frame extraction — never shown to user -->
<video id="hiddenVideo" muted playsinline webkit-playsinline></video>
<!-- Off-screen canvas for grabbing the frame -->
<canvas id="frameCanvas" style="display:none"></canvas>

<header>
  <h1>CROWD<span>PICK</span></h1>
  <p>// Random winner from your video</p>
</header>

<div class="steps">

  <!-- STEP 1: Upload -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">1</span>
      <span class="step-title">Record or upload a video of your group</span>
      <span class="step-status" id="uploadStatus">Waiting</span>
    </div>

    <div id="dropZone" onclick="document.getElementById('fileInput').click()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 10l-4 4-4-4"/>
        <path d="M11 14V3"/>
        <rect x="3" y="15" width="18" height="6" rx="2"/>
      </svg>
      <span class="dz-label">Tap to record or choose video</span>
      <span class="dz-filename" id="dzFilename"></span>
    </div>
    <input type="file" id="fileInput" accept="video/*" capture="environment">
  </div>

  <!-- STEP 2: Settings -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">2</span>
      <span class="step-title">Detection settings</span>
    </div>
    <div class="conf-row">
      <label>Confidence</label>
      <input type="range" id="confSlider" min="20" max="90" value="45" oninput="updateConf(this.value)">
      <span class="conf-val" id="confVal">45%</span>
    </div>
  </div>

  <!-- STEP 3: Pick -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">3</span>
      <span class="step-title">Pick a winner</span>
      <span class="step-status" id="pickStatus"></span>
    </div>

    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <span id="progressLabel">Preparing...</span>
    </div>

    <button class="btn btn-primary" id="pickBtn" onclick="runPick()" disabled>
      🎲 Pick Random Winner
    </button>
  </div>

  <!-- STEP 4: Result -->
  <div class="step" id="resultStep" style="display:none">
    <div class="step-header">
      <span class="step-num">4</span>
      <span class="step-title">Result</span>
      <span class="step-status done">Done</span>
    </div>

    <div id="winnerBadge">
      <span class="wb-num" id="wbNum">#1</span>
      <div class="wb-right">
        <div class="wb-label">WINNER</div>
        <div class="wb-sub" id="wbSub">Person 1 of 1 detected</div>
      </div>
    </div>

    <div id="resultWrap">
      <canvas id="resultCanvas"></canvas>
      <span id="peopleCount"></span>
    </div>

    <button class="btn btn-ghost" onclick="reset()" style="margin-top:0.25rem">
      ↺ Start over
    </button>
  </div>

</div>

<script>
  let model         = null;
  let videoFile     = null;
  let confThreshold = 0.45;

  const hiddenVideo  = document.getElementById('hiddenVideo');
  const frameCanvas  = document.getElementById('frameCanvas');
  const frameCtx     = frameCanvas.getContext('2d');
  const resultCanvas = document.getElementById('resultCanvas');
  const resultCtx    = resultCanvas.getContext('2d');

  // ── Model load ───────────────────────────────────────────────
  async function loadModel() {
    try {
      setLoadMsg('Setting up TensorFlow...');
      await tf.setBackend('webgl');
      await tf.ready();

      setLoadMsg('Loading detection model...');
      model = await cocoSsd.load({ base: 'mobilenet_v1' });

      setLoadMsg('Warming up...');
      const dummy = tf.zeros([300, 300, 3], 'int32');
      await model.detect(dummy);
      dummy.dispose();

      hideLoader();
    } catch(e) {
      setLoadMsg('Load failed: ' + e.message);
      console.error(e);
    }
  }

  function setLoadMsg(t) { document.getElementById('loadMsg').textContent = t; }

  function hideLoader() {
    const el = document.getElementById('loadingOverlay');
    el.classList.add('hide');
    setTimeout(() => el.remove(), 500);
  }

  // ── File input ───────────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    videoFile = file;

    // Show filename
    const dz = document.getElementById('dropZone');
    dz.classList.add('has-file');
    const label = dz.querySelector('.dz-label');
    const fname = document.getElementById('dzFilename');
    label.style.display = 'none';
    fname.style.display = '';
    fname.textContent   = file.name;

    document.getElementById('uploadStatus').textContent = 'Ready';
    document.getElementById('uploadStatus').classList.add('done');
    document.getElementById('pickBtn').disabled = false;
  });

  // ── Main pick flow ───────────────────────────────────────────
  async function runPick() {
    if (!videoFile || !model) return;

    document.getElementById('pickBtn').disabled = true;
    document.getElementById('resultStep').style.display = 'none';
    showProgress(true);
    setProgress(5, 'Loading video...');

    try {
      // 1. Load video into hidden element
      const videoURL = URL.createObjectURL(videoFile);
      await loadVideoMeta(hiddenVideo, videoURL);
      setProgress(20, 'Choosing random frame...');

      // 2. Pick a random timestamp (avoid first/last 5% to skip fades/blurs)
      const duration = hiddenVideo.duration;
      const margin   = duration * 0.05;
      const randomT  = margin + Math.random() * (duration - margin * 2);

      // 3. Seek to that timestamp
      await seekVideo(hiddenVideo, randomT);
      setProgress(40, 'Capturing frame...');

      // 4. Draw that frame onto the off-screen canvas
      frameCanvas.width  = hiddenVideo.videoWidth;
      frameCanvas.height = hiddenVideo.videoHeight;
      frameCtx.drawImage(hiddenVideo, 0, 0);

      setProgress(55, 'Detecting people...');

      // 5. Run detection on the captured frame (ImageData from canvas)
      const predictions = await model.detect(frameCanvas);
      const persons     = predictions.filter(p => p.class === 'person' && p.score >= confThreshold);

      if (persons.length === 0) {
        setProgress(100, 'No people detected — try lowering confidence or a different video');
        document.getElementById('pickBtn').disabled = false;
        URL.revokeObjectURL(videoURL);
        return;
      }

      setProgress(80, 'Picking winner...');

      // 6. Pick random winner
      const winnerIdx = Math.floor(Math.random() * persons.length);

      setProgress(95, 'Drawing result...');

      // 7. Draw annotated result
      drawResult(persons, winnerIdx);

      // 8. Show result
      showProgress(false);
      showResult(winnerIdx, persons.length);
      launchConfetti();

      URL.revokeObjectURL(videoURL);

    } catch(e) {
      setProgress(100, 'Error: ' + e.message);
      console.error(e);
      document.getElementById('pickBtn').disabled = false;
    }
  }

  // ── Video helpers ────────────────────────────────────────────

  // Load video and wait for metadata (duration, dimensions)
  function loadVideoMeta(videoEl, src) {
    return new Promise((resolve, reject) => {
      videoEl.src = src;
      videoEl.load();
      const onMeta = () => { cleanup(); resolve(); };
      const onErr  = (e) => { cleanup(); reject(new Error('Video load failed: ' + e.message)); };
      const cleanup = () => {
        videoEl.removeEventListener('loadedmetadata', onMeta);
        videoEl.removeEventListener('error', onErr);
      };
      videoEl.addEventListener('loadedmetadata', onMeta);
      videoEl.addEventListener('error', onErr);
      // iOS sometimes needs a play() call to trigger metadata loading
      videoEl.play().catch(() => {});
      setTimeout(() => videoEl.pause(), 100);
    });
  }

  // Seek to a specific time and wait for the frame to be ready
  function seekVideo(videoEl, time) {
    return new Promise((resolve, reject) => {
      // Pause first
      videoEl.pause();
      videoEl.currentTime = time;
      const onSeeked = () => { cleanup(); resolve(); };
      const onErr    = () => { cleanup(); reject(new Error('Seek failed')); };
      const cleanup  = () => {
        videoEl.removeEventListener('seeked', onSeeked);
        videoEl.removeEventListener('error', onErr);
      };
      videoEl.addEventListener('seeked', onSeeked);
      videoEl.addEventListener('error', onErr);
      // Fallback: if seeked never fires in 4s, try anyway
      setTimeout(() => { cleanup(); resolve(); }, 4000);
    });
  }

  // ── Drawing ──────────────────────────────────────────────────
  function drawResult(persons, winnerIdx) {
    // Copy the captured frame onto the result canvas
    resultCanvas.width  = frameCanvas.width;
    resultCanvas.height = frameCanvas.height;
    resultCtx.drawImage(frameCanvas, 0, 0);

    // Dim non-winners slightly
    persons.forEach((p, i) => {
      if (i !== winnerIdx) {
        const [x, y, w, h] = p.bbox;
        resultCtx.fillStyle = 'rgba(0,0,0,0.35)';
        resultCtx.fillRect(x, y, w, h);
      }
    });

    // Draw all boxes
    persons.forEach((p, i) => {
      const [x, y, w, h] = p.bbox;
      const isWinner = i === winnerIdx;
      const color    = isWinner ? '#00ffaa' : '#ff3c5f';

      resultCtx.globalAlpha = isWinner ? 1 : 0.7;
      resultCtx.strokeStyle = color;
      resultCtx.lineWidth   = isWinner ? 4 : 2;
      resultCtx.strokeRect(x, y, w, h);

      // Winner glow
      if (isWinner) {
        resultCtx.shadowColor = '#00ffaa';
        resultCtx.shadowBlur  = 24;
        resultCtx.strokeRect(x, y, w, h);
        resultCtx.shadowBlur  = 0;
      }

      // Corner brackets
      const cs = Math.min(22, w * 0.15, h * 0.1);
      resultCtx.lineWidth = isWinner ? 5 : 3;
      resultCtx.beginPath();
      resultCtx.moveTo(x, y + cs);        resultCtx.lineTo(x, y);          resultCtx.lineTo(x + cs, y);
      resultCtx.moveTo(x + w - cs, y);    resultCtx.lineTo(x + w, y);      resultCtx.lineTo(x + w, y + cs);
      resultCtx.moveTo(x, y + h - cs);    resultCtx.lineTo(x, y + h);      resultCtx.lineTo(x + cs, y + h);
      resultCtx.moveTo(x + w - cs, y + h);resultCtx.lineTo(x + w, y + h);  resultCtx.lineTo(x + w, y + h - cs);
      resultCtx.stroke();

      // Label
      const label    = isWinner ? '★  WINNER' : `#${i + 1}`;
      const fontSize = Math.max(13, Math.min(22, h * 0.07));
      resultCtx.font = `600 ${fontSize}px 'DM Mono', monospace`;
      const tw = resultCtx.measureText(label).width;
      const lh = fontSize + 10;

      resultCtx.globalAlpha = isWinner ? 0.95 : 0.8;
      resultCtx.fillStyle   = color;
      resultCtx.fillRect(x, y - lh, tw + 14, lh);
      resultCtx.fillStyle   = isWinner ? '#000' : '#fff';
      resultCtx.globalAlpha = 1;
      resultCtx.fillText(label, x + 7, y - 6);
    });

    resultCtx.globalAlpha = 1;
    resultCtx.shadowBlur  = 0;
  }

  // ── UI helpers ───────────────────────────────────────────────
  function showProgress(visible) {
    document.getElementById('progressWrap').style.display = visible ? 'flex' : 'none';
  }

  function setProgress(pct, label) {
    document.getElementById('progressFill').style.width  = pct + '%';
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('pickStatus').textContent    = label;
    document.getElementById('pickStatus').className      = 'step-status active';
  }

  function showResult(winnerIdx, total) {
    // Winner badge
    document.getElementById('wbNum').textContent  = '#' + (winnerIdx + 1);
    document.getElementById('wbSub').textContent  = `Person ${winnerIdx + 1} of ${total} detected`;
    document.getElementById('winnerBadge').style.display = 'flex';

    // Canvas
    document.getElementById('resultWrap').style.display = 'flex';

    // Count note
    const pc = document.getElementById('peopleCount');
    pc.innerHTML = `<span>${total}</span> ${total === 1 ? 'person' : 'people'} detected in frame`;
    pc.style.display = '';

    // Show result step
    document.getElementById('resultStep').style.display = '';

    document.getElementById('pickStatus').textContent = 'Done';
    document.getElementById('pickStatus').className   = 'step-status done';

    // Scroll to result
    document.getElementById('resultStep').scrollIntoView({ behavior: 'smooth' });

    // Re-enable pick for another attempt
    document.getElementById('pickBtn').disabled  = false;
    document.getElementById('pickBtn').textContent = '🎲 Pick Again (new random frame)';
  }

  function reset() {
    videoFile = null;
    document.getElementById('fileInput').value  = '';
    document.getElementById('dropZone').classList.remove('has-file');
    document.getElementById('dropZone').querySelector('.dz-label').style.display = '';
    document.getElementById('dzFilename').style.display = 'none';
    document.getElementById('uploadStatus').textContent = 'Waiting';
    document.getElementById('uploadStatus').className   = 'step-status';
    document.getElementById('pickBtn').disabled = true;
    document.getElementById('pickBtn').textContent = '🎲 Pick Random Winner';
    document.getElementById('resultStep').style.display = 'none';
    document.getElementById('pickStatus').textContent   = '';
    showProgress(false);
    hiddenVideo.src = '';
  }

  function updateConf(v) {
    confThreshold = v / 100;
    document.getElementById('confVal').textContent = v + '%';
  }

  function launchConfetti() {
    const colors = ['#ff3c5f','#ffcc00','#00ffaa','#ffffff','#ff9940','#a78bfa'];
    for (let i = 0; i < 60; i++) {
      const el   = document.createElement('div');
      el.className = 'confetti';
      const size = 5 + Math.random() * 7;
      el.style.cssText = `
        left:${Math.random()*100}vw;top:-12px;
        width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.45?'50%':'1px'};
        animation-duration:${1.8+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  loadModel();
</script>
</body>
</html>
